<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login fictício da Floricultura Pétala Serena com validação de e-mail e senha usando JavaScript." />
  <title>Login Falso | Pétala Serena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#conteudo">Pular para o conteúdo principal</a>

  <header class="site-header" data-header>
    <nav class="navbar container" aria-label="Navegação principal">
      <a class="brand" href="index.html"><span class="brand__icon" aria-hidden="true">✿</span><span>Pétala Serena</span></a>
      <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" data-nav-toggle><span></span><span></span><span></span></button>
      <ul class="nav-menu" data-nav-menu>
        <li><a href="index.html">Home</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a class="nav-menu__login" href="login.html" aria-current="page">Login</a></li>
      </ul>
    </nav>
  </header>

  <main id="conteudo">
    <section class="login-section" aria-labelledby="login-title">
      <div class="login-card">
        <div class="login-card__visual" aria-hidden="true">
          <span class="floating-petal floating-petal--one"></span>
          <span class="floating-petal floating-petal--two"></span>
          <span class="floating-petal floating-petal--three"></span>
        </div>

        <div class="login-card__content">
          <p class="eyebrow">Área do cliente</p>
          <h1 id="login-title">Login falso para demonstrar validação.</h1>
          <p>Use qualquer e-mail válido e uma senha com no mínimo 6 caracteres. Nenhum dado é enviado para servidor.</p>

          <form class="form login-form" data-login-form novalidate>
            <div class="form-field">
              <label for="login-email">E-mail</label>
              <input id="login-email" name="email" type="email" placeholder="cliente@exemplo.com" autocomplete="email" />
              <small class="field-message" data-error-for="login-email"></small>
            </div>

            <div class="form-field">
              <label for="login-password">Senha</label>
              <div class="password-wrapper">
                <input id="login-password" name="password" type="password" placeholder="Mínimo de 6 caracteres" autocomplete="current-password" />
                <button type="button" data-toggle-password aria-label="Mostrar senha">Mostrar</button>
              </div>
              <small class="field-message" data-error-for="login-password"></small>
            </div>

            <label class="checkbox-line">
              <input type="checkbox" name="remember" />
              <span>Lembrar acesso nesta simulação</span>
            </label>

            <button class="button button--primary button--full" type="submit">Entrar</button>
            <p class="form-feedback" data-login-feedback aria-live="polite"></p>
          </form>

          <a class="text-link" href="index.html">Voltar para a home</a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
